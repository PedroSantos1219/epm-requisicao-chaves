<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <title>QR Code — Requisição de Chaves</title>
  <link rel="stylesheet" href="../css/qrcode.css?v=1" />
</head>
<body>

<div class="qr-card">
  <img src="../assets/logo.png" alt="Logótipo" width="48" height="48" />
  <h1>Requisição de Chaves</h1>
  <p>Aponte a câmara para aceder ao sistema</p>

  <img class="qr-img" src="../assets/qrcode.png" alt="QR Code de acesso" />

  <p class="qr-url">sistema.pt</p>

  <div class="qr-actions">
    <button class="btn-qr-print" onclick="window.print()">Descarregar</button>
    <a class="btn-qr-back" href="index.html">Voltar</a>
  </div>
</div>

</body>
</html>
