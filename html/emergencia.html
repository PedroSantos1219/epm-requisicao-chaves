<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <title>Backup de Segurança</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="../css/main.css?v=5" />
  <link rel="stylesheet" href="../css/responsive.css?v=5" />
  <link rel="stylesheet" href="../css/emergencia.css?v=2" />
</head>
<body>

<!--
  PÁGINA DESATIVADA — os backups do painel de admin são suficientes.
  Código mantido abaixo para referência futura.

  <div class="siren-overlay" id="sirenOverlay">
    <div class="siren-text">BACKUP DE EMERGÊNCIA</div>
    <div class="siren-sub" id="sirenStatus">A criar backup de segurança...</div>
    <svg class="progress-ring" viewBox="0 0 80 80">
      <circle class="bg" cx="40" cy="40" r="36" />
      <circle class="fg" cx="40" cy="40" r="36" id="progressCircle" />
    </svg>
    <button class="btn btn-light mt-3" id="btnCancelEmergencia" class="btn-cancel-emergency">Cancelar</button>
  </div>

  <audio id="sirenAudio" preload="auto">
    <source src="../assets/emergenciasirene.mp3" type="audio/mpeg" />
  </audio>

  <header class="topbar">
    <div class="container topbar-inner">
      <a href="index.html" class="brand">
        <img src="../assets/logo.png" alt="Logótipo" class="logo-img" width="40" height="40">
        Requisição de Chaves
      </a>
      <a class="btn btn-outline-success" href="index.html">Voltar</a>
    </div>
  </header>

  <main class="container">
    <div class="emergency-zone" id="emergencyZone">
      <div class="emergency-title">Emergência</div>
      <p class="emergency-description mb-4">
        Este botão cria um <strong>backup completo e imediato</strong> da base de dados,
        incluindo todas as <strong>chaves, utilizadores e requisições</strong> registadas no sistema.
      </p>
      <p class="emergency-description mb-4">
        <strong>Quando usar:</strong> utilize apenas em situações de emergência, como por exemplo
        se dados foram apagados por engano, se houve uma alteração suspeita no sistema,
        ou antes de qualquer operação que considere arriscada.
      </p>
      <p class="emergency-description mb-4">
        <strong>O que acontece:</strong> ao clicar no botão, é criada uma cópia de segurança
        da base de dados atual. De seguida, será redirecionado para a página principal.
        Para restaurar um backup, aceda ao <strong>Painel de Administração</strong> e selecione
        o backup pretendido na secção de backups.
      </p>
      <p class="emergency-description mb-2">
        Os backups ficam guardados durante <strong>72 horas (3 dias)</strong>.
      </p>

      <img src="../assets/emergencia.png" alt="Botão de Emergência"
           class="emergency-btn" id="btnEmergencia"
           title="Clique para criar backup de emergência" />

      <p class="text-muted mt-3 info-text-sm">
        Clique no botão acima para ativar o backup de emergência
      </p>
    </div>

    <div class="text-center mt-4 mb-3">
      <a class="btn btn-outline-success px-4" href="index.html">Voltar</a>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <small>Direitos reservados &copy; 2026 - PAP Pedro Santos | <a href="privacidade.html">Privacidade & Cookies</a></small>
    </div>
  </footer>

  <div class="cookie-banner" id="cookieBanner" style="display:none">
    <span>Este site utiliza cookies essenciais para o seu funcionamento. <a href="privacidade.html">Saber mais</a></span>
    <button class="btn btn-success btn-sm" id="cookieAccept">Aceitar</button>
  </div>

  <script src="../js/api.js?v=4"></script>
  <script>
    const btnEmergencia = document.getElementById("btnEmergencia");
    const sirenOverlay = document.getElementById("sirenOverlay");
    const sirenAudio = document.getElementById("sirenAudio");
    const sirenStatus = document.getElementById("sirenStatus");
    const progressCircle = document.getElementById("progressCircle");
    const emergencyZone = document.getElementById("emergencyZone");
    const btnCancel = document.getElementById("btnCancelEmergencia");
    const circumference = 2 * Math.PI * 36;

    let activated = false;
    let cancelled = false;
    let progressInterval = null;

    btnCancel.addEventListener("click", () => {
      cancelled = true;
      clearInterval(progressInterval);
      sirenAudio.pause();
      sirenAudio.currentTime = 0;
      document.body.classList.remove("siren-active");
      emergencyZone.classList.remove("shake-content");
      sirenOverlay.classList.remove("active");
      progressCircle.style.strokeDashoffset = circumference;
      activated = false;
    });

    btnEmergencia.addEventListener("click", async () => {
      if (activated) return;
      activated = true;
      cancelled = false;

      document.body.classList.add("siren-active");
      emergencyZone.classList.add("shake-content");
      sirenOverlay.classList.add("active");

      sirenAudio.currentTime = 0;
      sirenAudio.play().catch(() => {});

      const totalMs = 8000;
      const startTime = Date.now();
      sirenStatus.textContent = "A preparar backup... (clique Cancelar para anular)";

      progressInterval = setInterval(() => {
        if (cancelled) return;
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / totalMs, 1);
        const offset = circumference * (1 - progress);
        progressCircle.style.strokeDashoffset = offset;
      }, 50);

      await new Promise(resolve => setTimeout(resolve, totalMs));

      if (cancelled) return;

      clearInterval(progressInterval);
      progressCircle.style.strokeDashoffset = 0;
      btnCancel.style.display = "none";

      try {
        sirenStatus.textContent = "A criar backup de segurança...";
        await apiRequest("createBackup");
        sirenStatus.textContent = "Backup criado com sucesso!";
      } catch (error) {
        sirenStatus.textContent = "Backup criado (modo local).";
      }

      sirenAudio.pause();
      sirenAudio.currentTime = 0;
      sirenStatus.textContent = "A recarregar o sistema...";

      setTimeout(() => {
        window.location.href = "index.html";
      }, 800);
    });
  </script>
  <script>
    if (!localStorage.getItem('cookiesAccepted')) document.getElementById('cookieBanner').style.display = '';
    document.getElementById('cookieAccept')?.addEventListener('click', function() {
      localStorage.setItem('cookiesAccepted', '1');
      document.getElementById('cookieBanner').style.display = 'none';
    });
  </script>
-->

</body>
</html>
