<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <title>PIN de Professor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="../css/main.css?v=5" />
  <link rel="stylesheet" href="../css/responsive.css?v=5" />
  <link rel="stylesheet" href="../css/professor-pin.css?v=1" />
</head>
<body>

<header class="topbar">
  <div class="container topbar-inner">
    <a href="index.html" class="brand">
      <img src="../assets/logo.png" alt="Logótipo" class="logo-img" width="40" height="40">
      Requisição de Chaves
    </a>
    <a class="btn btn-outline-success" href="index.html">Voltar</a>
  </div>
</header>

<main class="container admin-login-main">

  <!-- Mensagens -->
  <div id="pinMsg" class="alert" style="display:none"></div>

  <div class="card mb-4">
    <div class="pin-warning-banner">
      <span class="pin-warning-icon">⚠</span>
      <span>Acesso restrito — introduza o PIN de professor para continuar.</span>
    </div>

    <form id="pinForm" class="mt-3">
      <label for="pinInput">PIN de Professor</label>
      <input type="password" class="form-control" id="pinInput" placeholder="••••" maxlength="8"
             inputmode="numeric" pattern="[0-9]*" autocomplete="off" required />

      <button type="submit" class="btn btn-success w-100 mt-3 fw-bold">Verificar PIN</button>
    </form>
  </div>


</main>

<footer class="footer">
  <div class="container">
    <small>Direitos reservados &copy; 2026 - PAP Pedro Santos | <a href="privacidade.html">Privacidade & Cookies</a></small>
  </div>
</footer>

<div class="cookie-banner" id="cookieBanner" style="display:none">
  <span>Este site utiliza cookies essenciais para o seu funcionamento. <a href="privacidade.html">Saber mais</a></span>
  <button class="btn btn-success btn-sm" id="cookieAccept">Aceitar</button>
</div>

<script src="../js/api.js?v=4"></script>
<script src="../js/requisicao.js?v=4"></script>
<script>
(function() {
  const msgEl = document.getElementById('pinMsg');
  const pinInput = document.getElementById('pinInput');

  // Focar automaticamente no input
  pinInput.focus();

  document.getElementById('pinForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pin = pinInput.value.trim();
    if (!pin) return;

    const submitBtn = e.target.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    msgEl.style.display = 'none';

    try {
      await apiVerifyProfessorPin(pin);
      setUserTipo('PROFESSOR');

      msgEl.style.display = 'block';
      msgEl.className = 'alert alert-success';
      msgEl.textContent = 'PIN verificado — modo Professor ativo.';

      setTimeout(() => { window.location.href = 'index.html'; }, 1000);
    } catch (error) {
      msgEl.style.display = 'block';
      msgEl.className = 'alert alert-danger';
      msgEl.textContent = 'PIN inválido. Tente novamente.';
      pinInput.value = '';
      pinInput.focus();
      submitBtn.disabled = false;
    }
  });
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
if (!localStorage.getItem('cookiesAccepted')) document.getElementById('cookieBanner').style.display = '';
document.getElementById('cookieAccept')?.addEventListener('click', function() {
  localStorage.setItem('cookiesAccepted', '1');
  document.getElementById('cookieBanner').style.display = 'none';
});
</script>
</body>
</html>
