<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <title>Devolver Chave</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

  <link rel="stylesheet" href="../css/main.css?v=5" />
  <link rel="stylesheet" href="../css/responsive.css?v=5" />
</head>
<body>

<header class="topbar">
  <div class="container topbar-inner">
    <a href="index.html" class="brand">
      <img src="../assets/logo.png" alt="Logótipo" class="logo-img" width="40" height="40">
      Requisição de Chaves
    </a>
    <a class="btn btn-outline-success" href="index.html">Voltar</a>
  </div>
</header>

<main class="container admin-login-main">

  <!-- Mensagens -->
  <div id="devolverMsg" class="alert" style="display:none"></div>

  <div class="card mb-4">
    <h5 class="mb-3">Devolver Chave</h5>
    <p class="text-muted info-text" id="devolverInfo"></p>

    <form id="devolverForm">
      <label for="devolverTelefone">Número de Telefone</label>
      <input type="tel" class="form-control" id="devolverTelefone" placeholder="Ex: 912345678" required />

      <button type="submit" class="btn btn-success w-100 mt-3">Devolver</button>
    </form>
  </div>


</main>

<footer class="footer">
  <div class="container">
    <small>Direitos reservados &copy; 2026 - PAP Pedro Santos | <a href="privacidade.html">Privacidade & Cookies</a></small>
  </div>
</footer>

<div class="cookie-banner" id="cookieBanner" style="display:none">
  <span>Este site utiliza cookies essenciais para o seu funcionamento. <a href="privacidade.html">Saber mais</a></span>
  <button class="btn btn-success btn-sm" id="cookieAccept">Aceitar</button>
</div>

<script src="../js/api.js?v=4"></script>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const reqId = params.get('id');
  const chave = params.get('chave');
  const msgEl = document.getElementById('devolverMsg');
  const form = document.getElementById('devolverForm');
  const submitBtn = form.querySelector('button[type="submit"]');
  const telefoneInput = document.getElementById('devolverTelefone');

  const MAX_TENTATIVAS = 15;
  const STORAGE_KEY = 'devolver_tentativas_' + (reqId || 'unknown');

  function getTentativas() {
    return parseInt(sessionStorage.getItem(STORAGE_KEY) || '0', 10);
  }

  function incrementarTentativas() {
    const n = getTentativas() + 1;
    sessionStorage.setItem(STORAGE_KEY, String(n));
    return n;
  }

  function mostrarBloqueado() {
    msgEl.style.display = 'block';
    msgEl.className = 'alert alert-danger';
    msgEl.textContent = 'Número de tentativas excedido. Por favor, contacte o administrador.';
    submitBtn.disabled = true;
    telefoneInput.disabled = true;
  }

  function mostrarErro(texto, restantes) {
    msgEl.style.display = 'block';
    msgEl.className = 'alert alert-warning';
    msgEl.textContent = texto + ' (' + restantes + ' tentativa' + (restantes === 1 ? '' : 's') + ' restante' + (restantes === 1 ? '' : 's') + ')';
  }

  function isNumeroValido(num) {
    // Número português: 9 dígitos, começa por 9 (móvel), 2 (fixo) ou 3 (serviços)
    return /^[923]\d{8}$/.test(num.replace(/\s+/g, ''));
  }

  if (!reqId) {
    msgEl.style.display = 'block';
    msgEl.className = 'alert alert-danger';
    msgEl.textContent = 'Requisição não encontrada.';
    submitBtn.disabled = true;
    return;
  }

  if (chave) {
    document.getElementById('devolverInfo').textContent = 'Chave: ' + decodeURIComponent(chave);
  }

  // Bloquear imediatamente se já excedeu as tentativas (ex: após refresh)
  if (getTentativas() >= MAX_TENTATIVAS) {
    mostrarBloqueado();
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    if (getTentativas() >= MAX_TENTATIVAS) {
      mostrarBloqueado();
      return;
    }

    const telefone = telefoneInput.value.trim();
    if (!telefone) return;

    // Validação de formato no cliente — SEM chamada à base de dados
    if (!isNumeroValido(telefone)) {
      const tentativas = incrementarTentativas();
      if (tentativas >= MAX_TENTATIVAS) {
        mostrarBloqueado();
      } else {
        mostrarErro('Número de telefone inválido. Tente outra vez.', MAX_TENTATIVAS - tentativas);
      }
      return;
    }

    submitBtn.disabled = true;
    msgEl.style.display = 'none';

    try {
      await apiDevolverRequisicao(parseInt(reqId, 10), telefone);
      msgEl.style.display = 'block';
      msgEl.className = 'alert alert-success';
      msgEl.textContent = 'Chave devolvida com sucesso!';
      sessionStorage.removeItem(STORAGE_KEY);
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    } catch (error) {
      const tentativas = incrementarTentativas();
      if (tentativas >= MAX_TENTATIVAS) {
        mostrarBloqueado();
      } else {
        mostrarErro(error.message || 'Número de telefone não encontrado. Tente outra vez.', MAX_TENTATIVAS - tentativas);
        submitBtn.disabled = false;
      }
    }
  });
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
if (!localStorage.getItem('cookiesAccepted')) document.getElementById('cookieBanner').style.display = '';
document.getElementById('cookieAccept')?.addEventListener('click', function() {
  localStorage.setItem('cookiesAccepted', '1');
  document.getElementById('cookieBanner').style.display = 'none';
});
</script>
</body>
</html>
